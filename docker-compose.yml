services:
  # Redis - In-memory data store for channel metadata and session management
  redis:
    image: redis:latest
    ports:
      - 6379:6379
    networks:
      - bodega-beam
    volumes:
      - redis_data:/data

  # Coturn - TURN/STUN server for WebRTC NAT traversal
  # Enables peer connections when users are behind firewalls or NAT
  coturn:
    image: coturn/coturn
    ports:
      - 3478:3478
      - 3478:3478/udp
      - 5349:5349
      - 5349:5349/udp
      # Relay Ports - Uncomment to enable UDP relay for production
      # - 49152-65535:49152-65535/udp
    environment:
      - DETECT_EXTERNAL_IP=yes
      - DETECT_RELAY_IP=yes
    command: -n --log-file=stdout --redis-userdb="ip=redis connect_timeout=30"
    networks:
      - bodega-beam

  # Bodega Beam - Main application service
  # P2P file sharing platform using WebRTC
  bodega-beam:
    build: .
    image: srswti/bodega-beam:latest
    ports:
      - 8080:8080
    environment:
      - PORT=8080
      - REDIS_URL=redis://redis:6379
    networks:
      - bodega-beam
    depends_on:
      - redis

networks:
  bodega-beam:
    driver: bridge

volumes:
  redis_data:
